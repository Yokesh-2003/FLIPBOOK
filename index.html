<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Flipbook</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for modern icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>



    <!-- Side Navigation Drawer (Thumbnails Panel) -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Table of Contents</h3>
            <button id="close-sidebar-btn" aria-label="Close Sidebar"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="sidebar-thumbnails">
            <div class="thumbnail-item active" data-page="0">
                <div class="thumbnail-img-wrapper">
                    <img src="1.png" alt="Cover Page">
                </div>
                <span>Front Cover</span>
            </div>
            <div class="thumbnail-item" data-page="1">
                <div class="thumbnail-img-wrapper">
                    <img src="2.png" alt="Page 2">
                </div>
                <span>About Us</span>
            </div>
            <div class="thumbnail-item" data-page="2">
                <div class="thumbnail-img-wrapper">
                    <img src="3.png" alt="Page 3">
                </div>
                <span>Glow Starts Here</span>
            </div>
            <div class="thumbnail-item" data-page="3">
                <div class="thumbnail-img-wrapper">
                    <img src="4.png" alt="Back Cover">
                </div>
                <span>Back Cover</span>
            </div>
        </div>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Main Application Wrapper -->
    <div class="app-container">
        
        <!-- Premium Floating Header (Glassmorphism Controls) -->
        <header class="glass-header">
            <div class="header-left">
                <button id="sidebar-toggle-btn" class="ctrl-btn" title="Table of Contents">
                    <i class="fa-solid fa-bars"></i>
                    <span>Pages</span>
                </button>
            </div>
            
            <div class="header-center">
            </div>

            <div class="header-right">
                <!-- Sound Toggle -->
                <button id="sound-btn" class="ctrl-btn" title="Toggle Sound">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                <!-- Zoom Toggle -->
                <button id="zoom-btn" class="ctrl-btn" title="Toggle Zoom">
                    <i class="fa-solid fa-magnifying-glass-plus"></i>
                </button>
                <!-- Fullscreen Toggle -->
                <button id="fullscreen-btn" class="ctrl-btn" title="Toggle Fullscreen">
                    <i class="fa-solid fa-expand"></i>
                </button>
            </div>
        </header>

        <!-- Book Viewport -->
        <main class="viewport">
            <!-- Navigation Arrow Left -->
            <button id="prev-page-btn" class="nav-arrow-btn left" aria-label="Previous Page">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <!-- Book Outer Container (enables pan/zoom) -->
            <div id="zoom-viewport" class="zoom-viewport">
                <div id="book-container" class="book-container">
                    <div id="book">
                        <!-- Page 1: Cover Spread -->
                        <div class="page" data-density="soft">
                            <div class="page-content">
                                <img src="1.png" alt="Front Cover">
                            </div>
                        </div>

                        <!-- Page 2: About Us -->
                        <div class="page" data-density="soft">
                            <div class="page-content">
                                <img src="2.png" alt="Meet Deekshita">
                            </div>
                        </div>

                        <!-- Page 3: Packages -->
                        <div class="page" data-density="soft">
                            <div class="page-content">
                                <img src="3.png" alt="Signature Package">
                            </div>
                        </div>

                        <!-- Page 4: Policy & Back Cover -->
                        <div class="page" data-density="soft">
                            <div class="page-content">
                                <img src="4.png" alt="Booking Policy">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation Arrow Right -->
            <button id="next-page-btn" class="nav-arrow-btn right" aria-label="Next Page">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </main>

        <!-- Floating Zoom Panel (Visible when zoom is active) -->
        <div id="zoom-controls" class="zoom-controls-panel hidden">
            <button id="zoom-out-btn" class="zoom-ctrl" title="Zoom Out"><i class="fa-solid fa-minus"></i></button>
            <span id="zoom-level">100%</span>
            <button id="zoom-in-btn" class="zoom-ctrl" title="Zoom In"><i class="fa-solid fa-plus"></i></button>
            <button id="zoom-reset-btn" class="zoom-ctrl" title="Reset Zoom"><i class="fa-solid fa-arrows-to-eye"></i></button>
        </div>

        <!-- Interactive Bottom Navigation and Progress Bar -->
        <footer class="footer-controls">
            <div class="slider-container">
                <input type="range" id="page-slider" class="page-slider" min="0" max="3" step="1" value="0">
                <div class="slider-progress" id="slider-progress"></div>
            </div>
            <div class="page-indicator" style="display: none;">
                <span id="page-number-display">Page 1 of 4</span>
            </div>
        </footer>
    </div>

    <!-- Page Flip Library Browser Minified Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <!-- Custom Application Script -->
    <script src="script.js"></script>
</body>
</html>
