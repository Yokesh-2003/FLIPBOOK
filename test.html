<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #f0f0f0; font-family: sans-serif; padding: 20px; }
        .grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        img { max-height: 300px; display: block; margin-bottom: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h2>Image Grid Test</h2>
    <div class="grid">
        <div class="card"><h3>1.png</h3><img src="1.png"></div>
        <div class="card"><h3>2.png</h3><img src="2.png"></div>
        <div class="card"><h3>3.png</h3><img src="3.png"></div>
        <div class="card"><h3>4.png</h3><img src="4.png"></div>
    </div>
</body>
</html>
